workflows:
  ios-workflow:
    name: BizGuard iOS
    max_build_duration: 60
    integrations:
      app_store_connect: BizGuard_Key_July2026
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.bizguard.app
      groups:
        - bizguard
      vars:
        APP_ID: co.bizguard.app
        VITE_SUPABASE_URL: https://gjkwqmaqxcwmoofkfdrh.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqa3dxbWFxeGN3bW9vZmtmZHJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTcwNDgsImV4cCI6MjA5MTQzMzA0OH0.W22GN9Gwx1-kkZCq5sX_dWp2ut8fj0oOTI0vKUd6y1Y
        VITE_API_URL: https://bizguard-production.up.railway.app
      node: v20
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Add iOS platform
        script: |
          cd frontend
          npm install -g @capacitor/cli
          npx cap add ios || true
          npx cap sync ios
      - name: Set app icon
        script: |
          ICONSET="frontend/ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICONSET"
          SRC="frontend/resources/icon.png"
          # Strip alpha channel: convert to BMP (no alpha) then back to PNG
          sips -s format bmp "$SRC" --out /tmp/_icon_flat.bmp
          sips -s format png /tmp/_icon_flat.bmp --out /tmp/_icon_noalpha.png
          SRC=/tmp/_icon_noalpha.png
          sips -z 40 40   "$SRC" --out "$ICONSET/icon-20@2x.png"
          sips -z 60 60   "$SRC" --out "$ICONSET/icon-20@3x.png"
          sips -z 29 29   "$SRC" --out "$ICONSET/icon-29.png"
          sips -z 58 58   "$SRC" --out "$ICONSET/icon-29@2x.png"
          sips -z 87 87   "$SRC" --out "$ICONSET/icon-29@3x.png"
          sips -z 80 80   "$SRC" --out "$ICONSET/icon-40@2x.png"
          sips -z 120 120 "$SRC" --out "$ICONSET/icon-40@3x.png"
          sips -z 120 120 "$SRC" --out "$ICONSET/icon-60@2x.png"
          sips -z 180 180 "$SRC" --out "$ICONSET/icon-60@3x.png"
          sips -z 76 76   "$SRC" --out "$ICONSET/icon-76.png"
          sips -z 152 152 "$SRC" --out "$ICONSET/icon-76@2x.png"
          sips -z 167 167 "$SRC" --out "$ICONSET/icon-83.5@2x.png"
          sips -z 1024 1024 "$SRC" --out "$ICONSET/icon-1024.png"
          python3 -c "
          import json
          images = [
            {'size':'20x20','idiom':'iphone','filename':'icon-20@2x.png','scale':'2x'},
            {'size':'20x20','idiom':'iphone','filename':'icon-20@3x.png','scale':'3x'},
            {'size':'29x29','idiom':'iphone','filename':'icon-29.png','scale':'1x'},
            {'size':'29x29','idiom':'iphone','filename':'icon-29@2x.png','scale':'2x'},
            {'size':'29x29','idiom':'iphone','filename':'icon-29@3x.png','scale':'3x'},
            {'size':'40x40','idiom':'iphone','filename':'icon-40@2x.png','scale':'2x'},
            {'size':'40x40','idiom':'iphone','filename':'icon-40@3x.png','scale':'3x'},
            {'size':'60x60','idiom':'iphone','filename':'icon-60@2x.png','scale':'2x'},
            {'size':'60x60','idiom':'iphone','filename':'icon-60@3x.png','scale':'3x'},
            {'size':'76x76','idiom':'ipad','filename':'icon-76.png','scale':'1x'},
            {'size':'76x76','idiom':'ipad','filename':'icon-76@2x.png','scale':'2x'},
            {'size':'83.5x83.5','idiom':'ipad','filename':'icon-83.5@2x.png','scale':'2x'},
            {'size':'1024x1024','idiom':'ios-marketing','filename':'icon-1024.png','scale':'1x'}
          ]
          data = {'images': images, 'info': {'version': 1, 'author': 'xcode'}}
          with open('$ICONSET/Contents.json', 'w') as f:
            json.dump(data, f, indent=2)
          "
      - name: Increment build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" frontend/ios/App/App/Info.plist
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: xcode-project build-ipa --workspace frontend/ios/App/App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
