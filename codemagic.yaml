workflows:
  ios-workflow:
    name: BizGuard iOS
    max_build_duration: 60
    integrations:
      app_store_connect: BizGuard_ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.bizguard.app
      groups:
        - bizguard
      vars:
        APP_ID: co.bizguard.app
        VITE_SUPABASE_URL: https://gjkwqmaqxcwmoofkfdrh.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdqa3dxbWFxeGN3bW9vZmtmZHJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTcwNDgsImV4cCI6MjA5MTQzMzA0OH0.W22GN9Gwx1-kkZCq5sX_dWp2ut8fj0oOTI0vKUd6y1Y
        VITE_API_URL: https://bizguard-production.up.railway.app
      node: v20
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Add iOS platform
        script: |
          cd frontend
          npm install -g @capacitor/cli
          npx cap add ios || true
          npx cap sync ios
      - name: Set app icon
        script: |
          ICON_SRC="frontend/resources/icon.png"
          ICON_DEST="frontend/ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DEST"
          for size in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $size $size "$ICON_SRC" --out "$ICON_DEST/AppIcon-${size}.png" 2>/dev/null
          done
          printf '{\n  "images": [\n    {"idiom":"iphone","scale":"2x","size":"20x20","filename":"AppIcon-40.png"},\n    {"idiom":"iphone","scale":"3x","size":"20x20","filename":"AppIcon-60.png"},\n    {"idiom":"iphone","scale":"2x","size":"29x29","filename":"AppIcon-58.png"},\n    {"idiom":"iphone","scale":"3x","size":"29x29","filename":"AppIcon-87.png"},\n    {"idiom":"iphone","scale":"2x","size":"40x40","filename":"AppIcon-80.png"},\n    {"idiom":"iphone","scale":"3x","size":"40x40","filename":"AppIcon-120.png"},\n    {"idiom":"iphone","scale":"2x","size":"60x60","filename":"AppIcon-120.png"},\n    {"idiom":"iphone","scale":"3x","size":"60x60","filename":"AppIcon-180.png"},\n    {"idiom":"ios-marketing","scale":"1x","size":"1024x1024","filename":"AppIcon-1024.png"}\n  ],\n  "info":{"author":"xcode","version":1}\n}' > "$ICON_DEST/Contents.json"
          echo "Icon set done"
      - name: Increment build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" frontend/ios/App/App/Info.plist
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \\
            --workspace frontend/ios/App/App.xcworkspace \\
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
