workflows:
  ios-workflow:
    name: BizGuard iOS
    max_build_duration: 60
    integrations:
      app_store_connect: BizGuard_ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.bizguard.app
      vars:
        APP_ID: co.bizguard.app
      node: v20
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Add iOS platform
        script: |
          cd frontend
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace frontend/ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-workflow:
    name: BizGuard Android
    max_build_duration: 60
    environment:
      android_signing:
        - bizguard_keystore
      vars:
        PACKAGE_NAME: co.bizguard.app
      node: v20
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install
      - name: Build web app
        script: |
          cd frontend
          npm run build
      - name: Add Android platform
        script: |
          npm install -g @capacitor/cli
          cd frontend
          npx cap add android || true
          npx cap sync android
      - name: Build Android release
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - frontend/android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
